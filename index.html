<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bister Bilal Analiz</title>

<meta property="og:title" content="Ortadoğu'da Ateş Çemberi">
<meta property="og:description" content="Petrodolar sisteminin Ortadoğu üzerindeki etkisi">
<meta property="og:image" content="https://codeadanus.github.io/bister-bilal-analiz/kapak-bg.png">
<meta property="og:type" content="website">

<style>

body{
background:#050505;
margin:0;
font-family:Arial;
color:white;
}

/* kitap container */

.reader{

max-width:900px;
margin:auto;
padding:30px;

}

/* header */

.header{

display:flex;
justify-content:space-between;
color:#aaa;
margin-bottom:10px;

}

/* kitap sayfa kutusu */

.book{

background:black;
border-radius:6px;
overflow:hidden;
box-shadow:0 0 50px rgba(0,0,0,0.9);

}

.book img{

width:100%;
display:block;

}

/* footer */

.footer{

display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;

}

button{

background:#111;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;

}

button:hover{

background:#333;

}

.pageNum{

color:#aaa;

}

</style>

</head>

<body>

<div class="reader">

<div class="header">

<div>Bister Bilal</div>
<div id="date"></div>

</div>

<div class="book">

<img id="page" src="kapak-bg.png">

</div>

<div class="footer">

<button onclick="prev()">← Önceki</button>

<div class="pageNum" id="num">1 / 6</div>

<button onclick="next()">Sonraki →</button>

</div>

</div>

<script>

/* tarih */

const d = new Date()

document.getElementById("date").innerText =
d.getDate()+" "+
["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][d.getMonth()]+" "+
d.getFullYear()

/* sayfalar */

const pages=[

"kapak-bg.png",
"page1-bg.png",
"page2-bg.png",
"page3-bg.png",
"page4-bg.png",
"page5-bg.png"

]

let p=0

function update(){

document.getElementById("page").src=pages[p]

document.getElementById("num").innerText=
(p+1)+" / "+pages.length

}

function next(){

if(p<pages.length-1){

p++
update()

}

}

function prev(){

if(p>0){

p--
update()

}

}

</script>

</body>
</html>
