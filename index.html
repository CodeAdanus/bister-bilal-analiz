<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bister Bilal Analiz</title>

<style>

body{
background:#0b0b0b;
color:#eaeaea;
font-family:Georgia,serif;
margin:0;
display:flex;
justify-content:center;
}

.reader{
width:900px;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:14px;
color:#bbb;
}

.page{
background:#111;
border-radius:10px;
padding:40px;
line-height:1.8;
box-shadow:0 0 25px rgba(255,180,80,0.1);
}

h1{
font-size:30px;
margin-bottom:20px;
}

h2{
margin-top:30px;
}

.footer{
display:flex;
justify-content:space-between;
margin-top:20px;
}

button{
background:#222;
border:none;
padding:10px 20px;
color:#fff;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}

.counter{
color:#999;
}

</style>
</head>

<body>

<div class="reader">

<div class="header">
<div>Bister Bilal Borsa Akademi</div>
<div id="date"></div>
</div>

<div class="page" id="page-content"></div>

<div class="footer">
<button onclick="prevPage()">← Önceki</button>
<div class="counter" id="counter"></div>
<button onclick="nextPage()">Sonraki →</button>
</div>

</div>

<script>

document.getElementById("date").innerText =
new Date().toLocaleDateString("tr-TR");

let pages = [

`<h1>Ortadoğu'da Ateş Çemberi</h1>

<p>Son günlerde Ortadoğu'da yaşananlar, ilk bakışta ABD-İsrail ittifakı ile İran arasında bir savaş gibi görünüyor...</p>

<p>Alevlerin yükseldiği ülkeler: Suudi Arabistan, Birleşik Arap Emirlikleri (BAE), Katar, Kuveyt, Bahreyn...</p>

<h2>Petrodoların 50 Yıllık Saltanatı</h2>

<p>Hikaye 1974'e, Henry Kissinger ile Suudi Kralı Faysal arasında yapılan gizli bir anlaşmaya dayanır...</p>

<p>Bu sistemi bir mahalle bakkalı gibi düşünün...</p>

<p>Peki ya biri bu sisteme meydan okursa...</p>

<h2>Müttefik İsyanı</h2>

<p>2021: İran petrolünün %90'ını yuan ile satmaya başladı...</p>

<p>2023: Suudi Arabistan Çin ile swap anlaşması yaptı...</p>

<p>2024: BAE ve Suudi Arabistan BRICS'e katıldı...</p>

<h2>Savaşın Gerçek Hedefleri</h2>

<p>Bu çatışma tek bir ülkeye karşı yürütülen basit bir savaş değildir...</p>

<h2>Temkinli Yatırımcının El Kitabı</h2>

<p>Bu atmosferde güvende kalmak zengin olmaktan daha önemlidir...</p>

<br>
<strong>BİLAL AKSOY</strong>
<br>Kurucu & Baş Analist
`,

`<h1>Petrol ve Dolar İlişkisi</h1>
<p>Petrol ticareti ile doların küresel hakimiyeti arasında güçlü bir bağ vardır...</p>`,

`<h1>Jeopolitik Riskler</h1>
<p>Enerji yolları üzerindeki gerilimler küresel piyasalarda dalgalanma yaratır...</p>`,

`<h1>Enerji ve Finans</h1>
<p>Enerji altyapısının hedef alınması küresel ticaretin merkezini sarsar...</p>`,

`<h1>Sonuç</h1>
<p>Jeopolitik krizler yatırımcılar için risk olduğu kadar fırsatlar da yaratır...</p>`

];

let current = 0;

function render(){

document.getElementById("page-content").innerHTML =
pages[current];

document.getElementById("counter").innerText =
(current+1)+" / "+pages.length;

}

function nextPage(){
if(current < pages.length-1){
current++;
render();
}
}

function prevPage(){
if(current>0){
current--;
render();
}
}

render();

</script>

</body>
</html>
