  <style>
    :root{
      --bg:#05070b;
      --panel:#12141b;
      --panel-2:#0d1016;
      --text:#f2f2f2;
      --muted:#c9ced8;
      --gold:#d9b46b;
      --gold-soft:rgba(217,180,107,.28);
      --cyan:#7fd7ff;
      --line:rgba(255,255,255,.08);
      --shadow:0 0 40px rgba(217,180,107,.08);
      --violet:#d8b4ff;
      --violet-strong:rgba(168,85,247,.55);
      --violet-soft:rgba(168,85,247,.38);
      --footer-height:96px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top,#111827 0%,#07090d 45%,#030406 100%);
      color:var(--text);
      font-family:Georgia, "Times New Roman", serif;
      overflow-x:hidden;
    }

    body{min-height:100vh}

    .shell{
      width:min(1280px, 96vw);
      margin:32px auto;
      display:grid;
      grid-template-columns:88px 1fr;
      gap:18px;
      align-items:start;
    }

    .side-nav{
      background:rgba(13,16,22,.75);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 10px;
      box-shadow:var(--shadow);
      position:sticky;
      top:18px;
      backdrop-filter:blur(10px);
    }

    .side-nav button{
      width:40px;
      height:40px;
      margin:10px 0;
      border-radius:50%;
      border:2px solid #d9b46b44;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      color:#ffe7b0;
      font-weight:700;
      font-size:18px;
      cursor:pointer;
      transition:.18s;
      box-shadow:0 0 0 #0000;
    }

    .side-nav button.active{
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 14px #ffe7b088, 0 0 2px #fff8;
      filter:drop-shadow(0 0 8px #d9b46b55);
    }

    .viewer{
      background:linear-gradient(180deg,rgba(28,24,45,.92),rgba(18,20,27,.96));
      border:1.5px solid rgba(255,255,255,.13);
      border-radius:32px;
      box-shadow:
        0 8px 48px 0 rgba(217,180,107,0.18),
        0 2px 32px 0 rgba(127,215,255,0.10),
        0 0 0 2.5px rgba(255,255,255,0.04),
        0 0 120px 0 rgba(123,88,255,0.10);
      overflow:hidden;
      backdrop-filter:blur(10px) saturate(1.08);
      position:relative;
      transition:box-shadow .3s;
      padding-bottom:var(--footer-height);
    }

    .viewer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 26px 16px;
      border-bottom:1.5px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0)),
        linear-gradient(90deg,rgba(217,180,107,0.06) 0%,rgba(255,255,255,0) 100%);
      box-shadow:0 2px 18px 0 rgba(217,180,107,0.06);
      backdrop-filter:blur(2.5px);
    }

    .brand-pill{
      font-size:16px;
      font-weight:600;
      padding:8px 18px;
      letter-spacing:.6px;
      border-radius:20px;
      background:linear-gradient(135deg,#1a2a45,#0d1628);
      border:1px solid rgba(255,210,120,0.35);
      box-shadow:0 0 10px rgba(255,210,120,0.25);
      color:#f7f8fb;
      display:inline-flex;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
    }

    .date{
      font-size:15px;
      font-weight:500;
      letter-spacing:.5px;
      color:#d9c7a0;
      font-family:Arial, Helvetica, sans-serif;
    }

    .page-wrap{
      padding:22px 22px 24px;
    }

    .page{
      min-height:920px;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      border:2.5px solid var(--gold-soft);
      box-shadow:
        0 0 0 2.5px #d9b46b33 inset,
        0 0 32px #d9b46b33 inset,
        0 0 60px #7fd7ff18 inset,
        0 0 44px 0 rgba(217,180,107,0.13),
        0 2px 24px 0 rgba(127,215,255,0.08);
      background:#0a0d13;
      backdrop-filter:blur(8px) saturate(1.10);
      transition:box-shadow .3s;
    }

    .page-bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(.78) contrast(1.08) saturate(1.12);
      transform:scale(1.02);
      transition:opacity .36s ease, transform .5s ease;
      opacity:1;
    }

    .page-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(7,10,16,.38) 0%, rgba(7,10,16,.32) 18%, rgba(7,10,16,.44) 48%, rgba(7,10,16,.62) 100%),
        linear-gradient(90deg, rgba(11,14,21,.62) 0%, rgba(11,14,21,.38) 40%, rgba(11,14,21,.48) 100%),
        radial-gradient(ellipse at top center, rgba(255,231,176,0.10) 0%, rgba(255,231,176,0.00) 70%);
      pointer-events:none;
      z-index:1;
    }

    .page-content{
      position:relative;
      z-index:2;
      max-width:860px;
      padding:42px 38px 54px;
      transition:opacity .30s ease, transform .36s ease;
      opacity:1;
      transform:translateY(0);
    }

    .page-content.is-leaving{
      opacity:0;
      transform:translateY(10px);
    }

    .page-bg.is-leaving{
      opacity:.2;
      transform:scale(1.04);
    }

    .page-title{
      margin:0 0 18px;
      font-size:clamp(44px, 5vw, 72px);
      line-height:1.08;
      font-weight:900;
      color:#ffe7b0;
      text-shadow:0 0 24px #d9b46b99, 0 2px 10px #000a, 0 0 2px #fff8;
      letter-spacing:-.4px;
      filter:drop-shadow(0 0 12px #d9b46b66);
    }

    .page-subtitle{
      margin:26px 0 12px;
      font-size:clamp(24px, 2.5vw, 38px);
      line-height:1.15;
      font-weight:800;
      color:var(--violet);
      text-shadow:
        0 0 10px var(--violet-strong),
        0 0 22px rgba(168,85,247,.42),
        0 2px 10px rgba(0,0,0,.45);
      filter:drop-shadow(0 0 10px var(--violet-soft));

    .page-content p,
    .page-content li{
      margin:0 0 16px;

      color:#f1f4fb;
      text-shadow:0 1px 4px rgba(0,0,0,.32);
    }

    .page-content ul{
      margin:0 0 16px 26px;
      padding:0;
    }

    .page-content .author{
      margin-top:28px;
      font-weight:700;
      color:#f7f8fb;
    }

    .page-content .author-role{
      font-family:Arial, Helvetica, sans-serif;
      color:#d8deea;
      font-size:15px;
      letter-spacing:.2px;
    }

    .viewer-footer{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      min-height:var(--footer-height);
      padding:14px 22px 20px;
      border-top:1.5px solid var(--line);
      background:
        linear-gradient(180deg, rgba(11,14,21,.10) 0%, rgba(11,14,21,.75) 18%, rgba(11,14,21,.96) 100%);
      box-shadow:0 -8px 30px 0 rgba(0,0,0,.28);
      backdrop-filter:blur(10px);
    }

    .viewer-footer .nav-btn{
      min-width:110px;
      border:none;
      border-radius:14px;
      padding:15px 26px;
      font-weight:800;
      font-size:20px;
      cursor:pointer;
      color:#ffe7b0;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      border:2px solid #d9b46b44;
      box-shadow:0 0 0 #0000;
      transition:.18s;
      letter-spacing:.5px;
      text-shadow:0 0 10px #d9b46b33;
    }

    .viewer-footer .nav-btn:hover:not(:disabled){
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 22px #ffe7b099, 0 0 2px #fff8;
      filter:drop-shadow(0 0 10px #d9b46b55);
    }

    .viewer-footer .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .counter{
      font-family:Arial, Helvetica, sans-serif;
      color:#e9eef9;
      font-weight:800;
      font-size:18px;
      letter-spacing:.8px;
    }

    @media (max-width:980px){
      .shell{grid-template-columns:1fr;}
      .side-nav{
        position:static;
        display:flex;
        gap:8px;
        padding:10px;
        overflow:auto;
      }
      .side-nav button{
        min-width:56px;
        margin:0;
      }
      .page{min-height:auto;}
      .page-content{padding:26px 22px 34px;}
      .page-title{font-size:34px;}
      .page-content p,
      .page-content li{
        font-size:17px;
        line-height:1.66;
      }
      .page-overlay{
        background:
          linear-gradient(180deg, rgba(7,10,16,.22) 0%, rgba(7,10,16,.18) 18%, rgba(7,10,16,.28) 48%, rgba(7,10,16,.44) 100%),
          linear-gradient(90deg, rgba(11,14,21,.32) 0%, rgba(11,14,21,.18) 40%, rgba(11,14,21,.28) 100%);
      }
      .page-bg{filter:brightness(.86) contrast(1.12) saturate(1.16);}
    }

    @media (max-width:640px){
      :root{
        --footer-height:88px;
      }

      .viewer-header{padding:16px 16px 12px; gap:10px;}
      .brand-pill{font-size:13px; padding:8px 12px;}
      .date{font-size:12px;}
      .page-wrap{padding:14px 14px 18px;}
      .page-title{font-size:30px;}
      .page-subtitle{font-size:22px;}
      .page-content p,
      .page-content li{font-size:16px;}
      .viewer-footer{padding:12px 14px 16px;}
      .viewer-footer .nav-btn{min-width:92px; padding:10px 12px;}
      .counter{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side-nav" id="sideNav"></aside>

    <main class="viewer">
      <div class="viewer-header">
        <div class="brand-pill">Bister Bilal Borsa Akademi</div>
        <div class="date" id="publishDate"></div>
      </div>

      <div class="page-wrap">
        <section class="page">
          <img id="pageBg" class="page-bg" src="" alt="">
          <div class="page-overlay"></div>
          <div id="pageContent" class="page-content"></div>
        </section>
      </div>

      <div class="viewer-footer">
        <button class="nav-btn" id="prevBtn">Önceki</button>
        <div class="counter" id="counter">1 / 5</div>
        <button class="nav-btn" id="nextBtn">Sonraki</button>
      </div>
    </main>
  </div>

  <script>
    const pages = [
      {
        bg: "1.png",
        html: `
          <h1 class="page-title">Tehlikenin farkında mısınız?</h1>
          <p>İran Meclis Başkanı dikkat çekici bir açıklama yaptı:</p>
          <p>"Aldığımız bilgilere göre, ABD bölgedeki bir ülkenin desteğiyle İran’a ait adalardan birine yönelik askeri operasyon hazırlığında.</p>
          <p>Düşmanın tüm hamleleri silahlı kuvvetlerimizin gözetimi altındadır. Herhangi bir girişim olursa, o ülkenin hayati altyapısı ciddi risk altına girer."</p>
          <p>Birçok kişi bu sözleri görmezden geldi. Yine klasik tehdit dili diye düşündü.</p>
          <p>Ama bu bir tehdit değil. Bu doğrudan bir istihbarat mesajı.</p>
          <p>Anlatayım...</p>
          <p>Önceki açıklamayı hatırlayın.</p>
          <p>İran Meclis Başkanı ne demişti?</p>
        `
      },
      {
        bg: "2.png",
        html: `
          <p>"Eğer enerji altyapımız hedef alınırsa, bölgedeki tüm enerji tesisleri, tuzdan arındırma sistemleri ve iletişim altyapıları meşru hedef kabul edilir."</p>
          <p>Orada açık bir şart vardı. “Bize dokunursanız karşılık veririz” diyordu.</p>
          <p>Peki şimdi ne diyor?</p>
          <p>Bu sefer doğrudan bilgi paylaşıyor. Bir operasyon hazırlığı olduğunu söylüyor. Bir bölge ülkesinin destek verdiğini ifade ediyor.</p>
          <p>ABD’nin bilinen bir stratejisi var:</p>
          <p>Müzakere teklif et. Karşı tarafın gardını indir. Sonra vur.</p>
          <p>Hamaney operasyonunu hatırlayın.</p>
          <p>Görüşmeler sürüyordu. Anlaşma yakın deniyordu.</p>
          <p>İran ne yaptı?</p>
          <p>Anlaşma olacak diye düşündü. Rahatladı.</p>
        `
      },
      {
        bg: "3.png",
        html: `
          <p>Tam o anda Hamaney ve yaklaşık 40 üst düzey isim operasyonla ortadan kaldırıldı.</p>
          <p>Sağ elinle tokalaşıyorsun. Sol elinle darbe indiriyorsun.</p>
          <p>Şimdi aynı tabloya tekrar bakın.</p>
          <p>Trump sürekli aynı mesajı veriyor: "Anlaşmaya çok yakınız."</p>
          <p>Dünya rahatlıyor. Herkes barış geliyor diye düşünüyor.</p>
          <p>Ama arka planda ne oluyor?</p>
          <p>ABD, 82. Hava İndirme Tümeni için intikal emrini onaylıyor.</p>
          <p>Barış görüşmesi yürütüyorsan neden hava indirme birliklerini hazırlıyorsun?</p>
          <p>Anlaşma bu kadar yakınsa neden kara kuvvetlerini hareketlendiriyorsun?</p>
          <p>Bir elde diplomasi metni. Diğer elde operasyon planı.</p>
          <p>Peki bu adalar neden kritik?</p>
          <p>İran’ın Basra Körfezi’ndeki adaları, Hürmüz Boğazı’nın girişini kontrol eder.</p>
        `
      },
      {
        bg: "4.png",
        html: `
          <p>Şimdi düşünün:</p>
          <p>Bir yanda ateşkes görüşmeleri var.</p>
          <p>Diğer yanda bu kontrol noktalarının fiziken ele geçirilmesi planlanıyor.</p>
          <p>Ama İran bu kez hazırlıklı.</p>
          <p>Hamaney operasyonundan ders çıkardı.</p>
          <p>O zaman müzakere sinyallerine güvenmişti. Gardını indirmişti. Bedeli ağır oldu.</p>
          <p>Şimdi ise farklı.</p>
          <p>Meclis Başkanı’nın şu sözünü tekrar okuyun:</p>
          <p>"Düşmanın tüm hareketleri gözetimimiz altında."</p>
          <p>Bu açık bir mesaj: “Bu kez uyanığız.”</p>
          <p>İran aynı hatayı tekrar etmeyeceğini söylüyor.</p>
          <p>Ama sadece savunmada değil. Saldırı planı da var.</p>
          <p>Ray Dalio bunu çok net ifade ediyor:</p>
          <p>Savaşta asıl önemli olan, ne kadar acı verebildiğin değil, ne kadar acıya dayanabildiğindir.</p>
        `
      },
      {
        bg: "5.png",
        html: `
          <p>İran ne yapıyor?</p>
          <p>Savaşı uzatmaya çalışıyor.</p>
          <p>Çünkü herkes biliyor ki Amerikan halkının ve yönetiminin uzun süren savaşlara tahammülü sınırlı.</p>
          <p>İran’ın stratejisi basit:</p>
          <p>Savaşı uzat. Maliyeti artır. Karşı tarafın direncini kır.</p>
          <p>İran için bu savaş varoluşsal. Bir hesaplaşma. Hayattan bile daha büyük bir mesele.</p>
          <p>Peki Amerika neyi düşünüyor?</p>
          <p>Yakıt fiyatları. Seçimler. Uluslararası baskı.</p>
          <p>İşte bu bakış açısı Dalio’yu endişelendiriyor.</p>
          <p>Dalio şöyle diyor:</p>
          <p>“Birçok ülkenin üst düzey yöneticileri özel konuşmalarında şunu sorguluyor: Trump iyi konuşuyor ama işler zorlaşınca gerçekten savaşabilir mi?”</p>
          <p>Bu sadece politikacıların değil, tüm dünyanın sorusu.</p>
          <p>Bu yüzden bu çatışma kritik bir döneme giriyor.</p>
          <p>Dalio’ya göre bu sürecin sonucu tarihi yeniden şekillendirecek.</p>
          <p>Etkisi sadece Ortadoğu ile sınırlı kalmayacak.</p>
          <p>Ticaret dengeleri değişecek. Sermaye akışları yön değiştirecek. Küresel düzen etkilenecek.</p>
          <p>Eğer Amerika kazanırsa:</p>
          <p>Dolara güven artar. Tahviller güçlenir. Müttefikler yakınlaşır. ABD liderliği pekişir.</p>
          <p>Eğer Amerika kaybederse:</p>
          <p>Dolar zayıflar. Tahviller satılır. Müttefikler uzaklaşır. Çin daha hızlı yükselir.</p>
          <p>Dalio’nun 500 yıllık tarih analizinden çıkan sonuç:</p>
          <p>Para ve güç her zaman kazanana akar. Kaybedenden uzaklaşır.</p>
          <p>Savaş başladığında herkes korkar.</p>
          <p>Ama en kritik an, barış konuşulduğu andır.</p>
          <p>Çünkü o anda insanlar gardını düşürür.</p>
          <p>Hamaney operasyonu tam da böyle bir anda gerçekleşti.</p>
          <p>Ve şimdi yine aynı sahne kuruluyor.</p>
          <p>Barış konuşuluyor...</p>
          <p class="author">Bilal AKSOY</p>
          <p class="author-role">BBA MarketLabs<br>Kurucu& Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
