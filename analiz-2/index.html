  <style>
    :root{

      --panel:#12141b;

    .side-nav{

    .side-nav button.active{

      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 14px #ffe7b088, 0 0 2px #fff8;
      filter:drop-shadow(0 0 8px #d9b46b55);
    }

    .viewer{
      background:linear-gradient(180deg,rgba(28,24,45,.92),rgba(18,20,27,.96));
      border:1.5px solid rgba(255,255,255,.13);

    .viewer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 26px 16px;
      border-bottom:1.5px solid var(--line);
      background:
        linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0)),
        linear-gradient(90deg,rgba(217,180,107,0.06) 0%,rgba(255,255,255,0) 100%);
      box-shadow:0 2px 18px 0 rgba(217,180,107,0.06);
      backdrop-filter:blur(2.5px);

    .brand-pill{

    .page-wrap{

    }

    .page{
      min-height:920px;

      overflow:hidden;
      position:relative;
      border:2.5px solid var(--gold-soft);
      box-shadow:
        0 0 0 2.5px #d9b46b33 inset,
        0 0 32px #d9b46b33 inset,

        0 0 44px 0 rgba(217,180,107,0.13),

    .page-bg{

    .page-overlay{
      position:absolute;

    .page-content.is-leaving{

    .page-bg.is-leaving{

    .page-title{

    .viewer-footer{

      cursor:pointer;
      color:#ffe7b0;
      background:linear-gradient(180deg,#181818 0%, #232323 100%);
      border:2px solid #d9b46b44;
      box-shadow:0 0 0 #0000;
      transition:.18s;
      letter-spacing:.5px;
      text-shadow:0 0 10px #d9b46b33;
    }

    .viewer-footer .nav-btn:hover:not(:disabled){
      background:linear-gradient(180deg,#ffe7b0 0%, #d9b46b 100%);
      color:#181818;
      border-color:#ffe7b0;
      box-shadow:0 0 22px #ffe7b099, 0 0 2px #fff8;

    .viewer-footer .nav-btn:disabled{
      opacity:.45;
      cursor:not-allowed;

    .counter{
      font-family:Arial, Helvetica, sans-serif;
      color:#e9eef9;

    @media (max-width:980px){
      .shell{grid-template-columns:1fr;}
      .side-nav{
        position:static;

      }

        min-width:56px;
        margin:0;
      }

      .page-content{padding:26px 22px 34px;}
      .page-title{font-size:34px;}
      .page-content p,
      .page-content li{
        font-size:17px;

      }
      .page-overlay{
        background:
          linear-gradient(180deg, rgba(7,10,16,.22) 0%, rgba(7,10,16,.18) 18%, rgba(7,10,16,.28) 48%, rgba(7,10,16,.44) 100%),

    @media (max-width:640px){

      }

      .viewer-header{padding:16px 16px 12px; gap:10px;}

    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="side-nav" id="sideNav"></aside>

    <main class="viewer">
      <div class="viewer-header">

  </div>

  <script>
    const pages = [
      {
        bg: "1.png",
        html: `
          <h1 class="page-title">NE OLACAĞINI MERAK EDİYORSAN 5. MADDEYE BAK</h1>
          <p>O madde kazananı açıklıyor.</p>
          <p>Herkes aynı soruyu soruyor.</p>
          <p>Anlaşma var mı? Yok mu?</p>
          <p>Trump: "Anlaşmaya çok yakınız."</p>
          <p>İran: "Hiçbir anlaşma yok."</p>
          <p>Herkesin kafası karışmış durumda.</p>
          <p>Çünkü herkes yanlış soruya odaklanıyor.</p>
          <p>Doğru soru şu: Anlaşma kimin şartlarıyla olacak?</p>
          <p>Şu anda gördüğünüz her açıklama, her çıkış, her tehdit o sorunun cevabını şekillendirmek için yapılıyor.</p>
          <p>Müsadenizle anlatıyorum, burası çok önemli...</p>
        `
      },
      {
        bg: "2.png",
        html: `
          <h1 class="page-title">Trump Neden Aynı Cümleyi Kuruyor?</h1>
          <p>Trump her fırsatta aynı cümleyi tekrar ediyor: "Anlaşmaya çok yakınız."</p>
          <p>Neden?</p>
          <p>Çünkü bu söylem Trump'a 3 önemli şey kazandırıyor.</p>
          <p>Birincisi: Piyasaları sakinleştiriyor.</p>
          <p>Borsa toparlanıyor. Petrol fiyatları gevşiyor. Dolar dengede kalıyor.</p>
          <p>Amerikan seçmeni cebine bakar. Benzin ucuzsa başkan işini yapıyor demektir.</p>
          <p>İkincisi: Harcamaları kontrol altında tutmaya çalışıyor.</p>
          <p>ABD'nin Ortadoğu'daki askeri operasyonlarının günlük maliyeti tahminen 1 milyar doları aşıyor.</p>
          <p>39 trilyon dolar borç yükü olan bir ülke. Ve buna rağmen her gün milyarlarca dolarlık savaş harcaması.</p>
          <p>Üçüncüsü: Uluslararası baskıyı azaltıyor.</p>
        `
      },
      {
        bg: "3.png",
        html: `
          <h1 class="page-title">İran Neden Anlaşma Yok Diyor?</h1>
          <p>NATO müttefikleri tedirgin. Küresel kamuoyu baskısı giderek artıyor.</p>
          <p>Trump "anlaşmaya yakınız" dediğinde bu baskıların büyük kısmını tek cümleyle bastırıyor.</p>
          <p>Peki İran neden "anlaşma yok" diyor?</p>
          <p>İran'ın durumuna bakın.</p>
          <p>Hamaney öldürüldü. Askeri altyapı ciddi zarar gördü. Ekonomi zaten zayıftı, şimdi daha da kırılgan.</p>
          <p>İran anlaşma istiyor mu?</p>
          <p>Elbette istiyor.</p>
          <p>Ama "anlaşma istiyoruz" dediği an müzakere gücünü kaybeder.</p>
          <p>Çünkü pazarlıkta en zayıf olan, ihtiyacını ilk belli eden taraftır.</p>
          <p>İran "anlaşma yok" dediğinde 3 şey kazanıyor.</p>
          <p>Birincisi: İç kamuoyuna mesaj veriyor.</p>
        `
      },
      {
        bg: "4.png",
        html: `
          <h1 class="page-title">Masadaki Psikoloji</h1>
          <p>"Teslim olmadık. Boyun eğmedik." diyerek iç desteği güçlendiriyor.</p>
          <p>İkincisi: Uluslararası alanda direnen taraf imajı oluşturuyor. Bu da sempati ve diplomatik destek getiriyor.</p>
          <p>Üçüncüsü: Ve en kritik olanı, Trump'a mesaj veriyor.</p>
          <p>"Bu iş kolay değil. Masaya daha güçlü gel."</p>
          <p>Şöyle düşünün.</p>
          <p>İki kişi bir ev satışı için buluşuyor.</p>
          <p>Satıcının evi satması gerekiyor. Borçları birikmiş. Paraya ihtiyacı var. Ama bunu alıcıya belli edemez.</p>
          <p>Ne diyor?</p>
          <p>"Bu evi bu fiyata vermem. Başka alıcılarım var. Fiyat bu. İstersen al."</p>
          <p>Alıcının evi alması gerekiyor. Oturacak yeri yok. Ama bunu satıcıya gösteremez.</p>
          <p>Ne diyor? "Bu fiyata almam. Daha iyi seçenekler var."</p>
        `
      },
      {
        bg: "5.png",
        html: `
          <h1 class="page-title">5 Başlık, Tek Kırılma Noktası</h1>
          <p>İkisi de yalan mı söylüyor? Hayır. İkisi de pozisyon alıyor.</p>
          <p>Şu an Trump ile İran arasında yaşanan tam olarak bu.</p>
          <p>Peki masada ne konuşuluyor?</p>
          <p>Herkes "barış" diyor. Ama aslında pazarlık edilen şey barış değil.</p>
          <p>5 başlık var. İlk 4'ünü herkes konuşuyor. 5. maddeyi ise kimse açıkça konuşmuyor.</p>
          <p>Birincisi: Nükleer program. Amerika "tamamen kapat" diyor. İran "sivil enerji hakkımız" diyor.</p>
          <p>İkincisi: Yaptırımlar. İran "hepsi kaldırılsın" diyor. Amerika "kademeli olur" diyor.</p>
          <p>Üçüncüsü: Amerika İran'a "vekil güçleri dağıt" diyor. İran "bu bizim iç meselemiz" diyor.</p>
          <p>Dördüncüsü: Askeri varlık. İran "bölgeden çekilin" diyor. Amerika "Körfez için güvenlik şart" diyor.</p>
          <p>Ve beşinci madde: "Hürmüz Boğazı'ndan geçiş artık koşulsuz olmayacak."</p>
          <p>Bence İran'ın masaya koyduğu en kritik hamle bu.</p>
        `
      },
      {
        bg: "6.png",
        html: `
          <h1 class="page-title">Kazananı Belirleyecek Madde</h1>
          <p>Bu 5 maddeyi bir kenara not edin.</p>
          <p>Anlaşma haberi geldiğinde bu listeye bakın.</p>
          <p>Kim nerede geri adım attı, kim nerede direnç gösterdi... gerçek kazananı orada görürsünüz.</p>
          <p>Ama önce 5. maddenin neden diğerlerinden daha tehlikeli olduğunu anlamak lazım.</p>
          <p>Dünya petrolünün yaklaşık %20'si Hürmüz Boğazı'ndan geçiyor.</p>
          <p>İran ne diyor? "Artık koşulsuz olmayacak."</p>
          <p>Bu cümle basit görünebilir. Ama içinde çok büyük bir kırılma ihtimali var.</p>
          <p>Dünyada petrol almak istiyorsanız önce dolar alırsınız. Sonra o dolarla petrol satın alırsınız.</p>
          <p>Sistem net: Petrol dolarla alınıp satılır. Herkes dolar tutmak zorunda kalır.</p>
          <p>Şimdi İran diyor ki: "Dolar istemiyorum" diyebilir, "Yuan kabul ederim" diyebilir.</p>
          <p>Bu kabul edilirse uzun vadede petrodolar sistemi baskı altına girer.</p>
          <p>Asıl soru şu: 5. madde ne olacak? İlk 4 madde klasik pazarlık, ama 5. maddede biri kazanırsa diğeri kaybeder.</p>
          <p>Ve bu masada kazanan en güçlü olan değil, en iyi pazarlık yapan olur.</p>
          <p class="author">Bilal AKSOY</p>
          <p class="author-role">BBA MarketLab<br>Kurucu & Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
