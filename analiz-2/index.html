  <style>

    .viewer-footer .nav-btn:hover:not(:disabled){

  <div class="shell">

  </div>

  <script>
    const pages = [
      {
        bg: "1.png",
        html: `
          <h1 class="page-title">Görünmeyen Cephe</h1>
          <p>Bir savaş düşünün. Ne tanklar gürlüyor ne de askerler siperlerde. İlk darbe, bir hastanenin ameliyathanesinde ışıkların sönmesiyle geliyor. Ardından bankamatikler ekranlarını siyaha bürüyor. Uçaklar pistte bekliyor ama kalkış izni yok. Petrol kulelerinde vanalar duruyor. Ve siz, elinizdeki telefonla ne olduğunu anlamaya çalışırken aslında bir bölgenin tamamı dijital bir kışa gömülüyor.</p>
          <p>İran'ın son açıklamasıyla birlikte, Ortadoğu'nun üzerinde yeni bir tehdit dolaşıyor. Bu tehdit, Hürmüz Boğazı'ndaki bir mayına ya da bir petrol kuyusuna atılan füzeyle sınırlı değil. Hedefte, bölgenin görünmez can damarları var: Microsoft, Google, Oracle, Nvidia, IBM ve Palantir.</p>
          <p>Bu şirketlerin isimleri çoğumuza tanıdık gelir. Bilgisayar ekranlarında gördüğümüz logolar, kullandığımız yazılımlar… Ancak onların Ortadoğu'daki asıl rolleri, birer perakende markası olmanın çok ötesinde. Onlar, modern bir ülkenin çalışması için gerekli olan dijital oksijeni sağlıyor. Ve eğer bu oksijen kesilirse, Körfez ülkeleri tek bir füze binayı yıkmadan felç olabilir.</p>
        `
      },
      {
        bg: "2.png",
        html: `
          <h1 class="page-title">Altı Şirket, Tek Bir Nabız</h1>
          <p>Ortadoğu'nun dijital kalbinin nerede attığını biliyor musunuz? Fiziksel binalarda değil, devasa veri merkezlerinde. Bu merkezler, bölgenin bankacılık sisteminden havalimanlarının kulelerine, hastanelerin hasta kayıtlarından petrol devlerinin üretim panolarına kadar her şeyi yönetiyor.</p>
          <p>Şimdi bu altı şirketin bölgedeki ayak izlerine yakından bakalım:</p>
          <ul>
            <li><strong>Microsoft ve Oracle:</strong> Birleşik Arap Emirlikleri'nde işlettikleri dev bulut merkezleri, bölgesel verinin bel kemiğini oluşturuyor.</li>
            <li><strong>Google:</strong> Dubai'deki operasyon merkezi, bölgedeki binlerce şirketin dijital iş süreçlerine ev sahipliği yapıyor.</li>
            <li><strong>IBM:</strong> Suudi Arabistan, BAE ve Katar'da kurumsal finans sistemlerinin ve devlet dairelerinin arka planında çalışan görünmez el.</li>
            <li><strong>Nvidia:</strong> Yapay zekanın kalbi olan çipleri, bölgedeki veri merkezlerinde kritik rol oynuyor.</li>
            <li><strong>Palantir:</strong> Ticari yazılım görüntüsünün ötesinde, istihbarat ve veri analiz kabiliyetiyle öne çıkıyor.</li>
          </ul>
          <p>Bu şirketler vurulduğunda, yıkılan beton ve çelik olmayacak. Ama binaların içindeki dijital dünya, bir kibrit çöpü gibi sönecek.</p>
        `
      },
      {
        bg: "3.png",
        html: `
          <h1 class="page-title">Çöküntünün Anatomisi: Finans ve Sağlık</h1>
          <p>Diyelim ki İran, bu şirketlerin bölgedeki kritik veri merkezlerini hedef alan bir saldırı düzenledi. İlk anda ne olur?</p>
          <h2 class="page-subtitle">Finansal Sistem Donuyor</h2>
          <p>Dubai, Doha ya da Riyad'da bir sabah uyandığınızda ATM'lerin çalışmadığını görün. Kredi kartı terminalleri hata veriyor, maaşlar yatmıyor, bankalar arası transfer sistemi çökmüş durumda.</p>
          <p>Yerel borsalar işlemleri askıya alır. Sermaye panikle kaçmak ister ama bunu yapacak dijital araç bile bulunamaz.</p>
          <h2 class="page-subtitle">Sağlık Hizmetleri Felç Oluyor</h2>
          <p>Doktor, hastanın geçmişine, alerjilerine, ilaç kayıtlarına ulaşamaz. Ameliyatlar planlanamaz, yoğun bakım takibi aksar, ilaç stokları kontrol edilemez.</p>
          <p>Dijital omurga çöktüğünde sağlık sistemi bir anda çağ atlamaz, çağ kaybeder.</p>
        `
      },
      {
        bg: "4.png",
        html: `
          <h1 class="page-title">Petrol, Lojistik ve Körfez'in Nabzı</h1>
          <p>Körfez ülkelerinin zenginliği artık yalnızca kuyudan çıkan ham petrolde değil, onu yöneten dijital sistemlerde yatıyor.</p>
          <h2 class="page-subtitle">Petrol Durursa</h2>
          <p>Aramco, ADNOC ve KatarEnergy gibi devlerin üretim tesisleri merkezi yazılımlar, sensörler ve veri panolarıyla yönetiliyor.</p>
          <p>Dijital altyapı çökerse üretim yalnızca yavaşlamaz, tamamen durabilir.</p>
          <h2 class="page-subtitle">Lojistik Ağı Kırılıyor</h2>
          <p>Havalimanlarında uçuş planları, limanlarda konteyner akışı, depolarda sevkiyat zinciri dijital sistemlerle yönetiliyor.</p>
          <p>Bu zincir koptuğunda gıda, ilaç, enerji ve ticaret aynı anda duvara toslayabilir.</p>
        `
      },
      {
        bg: "5.png",
        html: `
          <h1 class="page-title">Palantir: İstihbaratın Gözü</h1>
          <p>Palantir, listedeki en stratejik isim. Sıradan bir teknoloji şirketi değil, veriyi operasyonel güce çeviren bir platform.</p>
          <p>CIA, Pentagon ve NSA benzeri yapılarla ilişkilendirilen bu mimari, sahadan gelen verileri anlamlandırma ve hedefleme kabiliyeti sunuyor.</p>
          <p>Eğer Palantir'in bölgedeki operasyonları hedef alınırsa, ABD'nin Ortadoğu'daki istihbarat zincirinde ciddi kör noktalar oluşabilir.</p>
          <p>Bu sadece veri kaybı değil, karar alma refleksinin yavaşlaması anlamına gelir.</p>
        `
      },
      {
        bg: "6.png",
        html: `
          <h1 class="page-title">Yeni Savaşın Anatomisi</h1>
          <p>21. yüzyılın savaşları artık sadece sınırda, cephede, gökyüzünde verilmiyor. Bir bölgenin dijital beynini hedef almak, milyonlarca insanın hayatını aynı anda kilitleyebilir.</p>
          <p>Paranıza erişemez, tedavi olamaz, uçağa binemez, enerji akışını sürdüremez hale gelebilirsiniz. Bu yüzden veri merkezleri artık yeni çağın görünmeyen kaleleridir.</p>
          <p>İran'ın bu altı şirketi hedef listesine alması, savaşın klasik değil sistemik hale geldiğini gösteriyor. Bu bir füze savaşı kadar, hatta belki ondan daha fazla bir altyapı savaşıdır.</p>
          <p>Ve ilk patlama bazen gökyüzünde değil, sessizce kararan bir ekranda başlar.</p>
          <p class="author">BİLAL AKSOY</p>
          <p class="author-role">Kurucu & Baş Analist</p>
        `
      }
    ];

    let currentPage = 0;

    const pageBg = document.getElementById("pageBg");
    const pageContent = document.getElementById("pageContent");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const sideNav = document.getElementById("sideNav");
    const publishDate = document.getElementById("publishDate");

    const now = new Date();
    const day = String(now.getDate()).padStart(2, "0");
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const year = now.getFullYear();
    publishDate.textContent = `${day}.${month}.${year}`;

    function renderSideNav() {
      sideNav.innerHTML = "";
      pages.forEach((_, index) => {
        const btn = document.createElement("button");
        btn.textContent = index + 1;
        if (index === currentPage) btn.classList.add("active");
        btn.addEventListener("click", () => goToPage(index));
        sideNav.appendChild(btn);
      });
    }

    function renderPage() {
      const page = pages[currentPage];
      pageBg.src = page.bg;
      pageContent.innerHTML = page.html;
      counter.textContent = `${currentPage + 1} / ${pages.length}`;
      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === pages.length - 1;
      renderSideNav();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goToPage(index) {
      if (index < 0 || index >= pages.length || index === currentPage) return;

      pageContent.classList.add("is-leaving");
      pageBg.classList.add("is-leaving");

      setTimeout(() => {
        currentPage = index;
        renderPage();
        pageContent.classList.remove("is-leaving");
        pageBg.classList.remove("is-leaving");
      }, 220);
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage > 0) goToPage(currentPage - 1);
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" && currentPage > 0) goToPage(currentPage - 1);
      if (e.key === "ArrowRight" && currentPage < pages.length - 1) goToPage(currentPage + 1);
    });

    let touchStartX = null;

    document.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (touchStartX === null || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;

      if (dx > 60 && currentPage > 0) goToPage(currentPage - 1);
      if (dx < -60 && currentPage < pages.length - 1) goToPage(currentPage + 1);

      touchStartX = null;
    }, { passive: true });

    renderPage();
  </script>
</body>
</html>
